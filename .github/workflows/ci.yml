name: CI

on:
  push:
    branches: [main, 'v*.*.x']
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Check for lint issues
        run: |
          if grep -q '"eslint"' package.json; then
            npx eslint src/ tests/
          else
            echo "No linter configured — skipping"
          fi

  test-backend:
    name: Test Backend (Node ${{ matrix.node }})
    needs: lint-backend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGODB_URI: mongodb://localhost:27017/acms_test
      JWT_SECRET: ci-jwt-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - name: Pre-create test MongoDB URI file
        run: echo '{"uri":"mongodb://localhost:27017/acms_test"}' > /tmp/acms-test-mongo-uri.json
      - name: Run unit tests (no DB)
        run: npx jest tests/helpers.test.js tests/validate.test.js tests/middleware/auth.test.js --forceExit --no-cache
        env:
          NODE_OPTIONS: --experimental-vm-modules
      - name: Run route tests (with MongoDB)
        run: npx jest --forceExit --no-cache
        env:
          NODE_OPTIONS: --experimental-vm-modules
  test-frontend:
    name: Test Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Run frontend tests
        run: echo "No frontend test framework configured — checking build instead"
      - name: Build frontend
        run: npm run build
        working-directory: frontend
