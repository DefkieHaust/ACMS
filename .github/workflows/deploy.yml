name: Deploy

on:
  push:
    tags: ['v*']

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: DefkieHaust
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/defkiehaust/acms:${{ steps.tag.outputs.tag }}
            ghcr.io/defkiehaust/acms:latest

      - name: Parse SSH_HOST into user and host
        id: parse
        run: |
          echo "host=$(echo '${{ secrets.SSH_HOST }}' | cut -d@ -f2)" >> "$GITHUB_OUTPUT"
          echo "user=$(echo '${{ secrets.SSH_HOST }}' | cut -d@ -f1)" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.parse.outputs.host }}
          username: ${{ steps.parse.outputs.user }}
          key: ${{ secrets.SSH_KEY }}
          envs: JWT_SECRET,CORS_ORIGINS,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,STRIPE_SECRET_KEY
          script: |
            set -e
            mkdir -p ${{ secrets.WORK_DIR }}
            cd ${{ secrets.WORK_DIR }}
            curl -sL -o compose.yml \
              https://raw.githubusercontent.com/${{ github.repository }}/main/deploy/compose.yml
            : > .env
            if [ -n "$JWT_SECRET" ]; then echo "JWT_SECRET=$JWT_SECRET" >> .env; fi
            if [ -n "$CORS_ORIGINS" ]; then echo "CORS_ORIGINS=$CORS_ORIGINS" >> .env; fi
            if [ -n "$SMTP_HOST" ]; then echo "SMTP_HOST=$SMTP_HOST" >> .env; fi
            if [ -n "$SMTP_PORT" ]; then echo "SMTP_PORT=$SMTP_PORT" >> .env; fi
            if [ -n "$SMTP_USER" ]; then echo "SMTP_USER=$SMTP_USER" >> .env; fi
            if [ -n "$SMTP_PASS" ]; then echo "SMTP_PASS=$SMTP_PASS" >> .env; fi
            if [ -n "$STRIPE_SECRET_KEY" ]; then echo "STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY" >> .env; fi
            fuser -k 5000/tcp 2>/dev/null || true
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose pull && docker compose up -d
