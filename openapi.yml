openapi: 3.0.3
info:
  title: ACMS - Apartment Committee Management System
  description: |
    Multi-tenant SaaS platform for apartment/housing societies.
    Six role types: site_admin, apartment_admin, committee_head, committee_member, resident, unit_owner.
    Tenant isolation via `apartmentId` — all non-site-admin queries are scoped.
    All list endpoints support pagination: `?page=1&limit=20`.
    Response envelope: `{ success: boolean, data?: ..., error?: string, details?: ..., pagination?: { total, page, limit, totalPages } }`.
  version: 1.8.0
  contact:
    name: ACMS Team

servers:
  - url: /api
    description: API base path

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ────────── Enums ──────────
    RoleType:
      type: string
      enum: [site_admin, apartment_admin, committee_head, committee_member, resident, unit_owner]
    CommitteeRole:
      type: string
      enum: [committee_head, committee_member]
    ApartmentStatus:
      type: string
      enum: [active, suspended]
    UserStatus:
      type: string
      enum: [active, inactive]
    PlanPriceType:
      type: string
      enum: [per-unit, flat]
    BillingCycle:
      type: string
      enum: [monthly]
    LedgerType:
      type: string
      enum: [income, expense]
    BillStatus:
      type: string
      enum: [paid, unpaid, overdue]
    InvoiceStatus:
      type: string
      enum: [paid, unpaid]
    ComplaintStatus:
      type: string
      enum: [open, in_progress, resolved]
    UnitStatus:
      type: string
      enum: [occupied, vacant]
    ServiceRequestStatus:
      type: string
      enum: [open, in_progress, completed, cancelled]
    ServicePriority:
      type: string
      enum: [low, medium, high, urgent]
    BookingStatus:
      type: string
      enum: [confirmed, cancelled]
    VisitorStatus:
      type: string
      enum: [pre_approved, checked_in]
    ResidentType:
      type: string
      enum: [tenant, owner_family, owner]

    # ────────── Pagination ──────────
    Pagination:
      type: object
      properties:
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        totalPages: { type: integer }

    # ────────── API Envelope ──────────
    ApiResponse:
      type: object
      properties:
        success: { type: boolean }
        data: {}
        error: { type: string }
        details:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }

    # ────────── Auth ──────────
    LoginRequest:
      type: object
      required: [type, identifier, password]
      properties:
        apartmentName:
          type: string
          description: Required for all except site_admin. Lowercase apartment name.
        type:
          $ref: '#/components/schemas/RoleType'
        identifier:
          type: string
          description: Username, staff ID, or unit number
        password:
          type: string
      example:
        apartmentName: green-heights
        type: resident
        identifier: B-204
        password: secret123

    LoginResponse:
      type: object
      properties:
        token: { type: string }
        user:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
            type: { $ref: '#/components/schemas/RoleType' }
            residentType: { type: string, nullable: true }
            apartmentId: { type: string, nullable: true }
            committeeId: { type: string, nullable: true }
            unitId: { type: string, nullable: true }
            unitNumber: { type: string, nullable: true }
            phone: { type: array, items: { type: string } }
            identityNumber: { type: string }
            residence: { type: string }

    ChangePasswordRequest:
      type: object
      required: [newPassword]
      properties:
        currentPassword: { type: string, description: Optional for site_admin, committee_head, committee_member }
        newPassword: { type: string, minLength: 6 }

    ApartmentInfo:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        address: { type: string }
        city: { type: string }
        country: { type: string }
        apartmentType: { type: string }

    # ────────── Apartment ──────────
    Apartment:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        address: { type: string }
        city: { type: string }
        country: { type: string }
        apartmentType: { type: string }
        defaultCurrency: { type: string }
        status: { $ref: '#/components/schemas/ApartmentStatus' }
        planId: { type: string, nullable: true, description: 'Plan ID or populated object' }
        createdAt: { type: string, format: date-time }

    CreateApartmentRequest:
      type: object
      required: [name, address]
      properties:
        name: { type: string, description: Unique apartment name (lowercased) }
        address: { type: string }
        city: { type: string }
        country: { type: string }
        apartmentType: { type: string }
        defaultCurrency: { type: string, default: USD }

    UpdateApartmentRequest:
      type: object
      properties:
        address: { type: string }
        city: { type: string }
        country: { type: string }
        apartmentType: { type: string }
        defaultCurrency: { type: string }
        status: { $ref: '#/components/schemas/ApartmentStatus' }
        planId: { type: string, nullable: true }

    # ────────── Plan ──────────
    Plan:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        priceType: { $ref: '#/components/schemas/PlanPriceType' }
        price: { type: number }
        currency: { type: string, default: USD }
        billingCycle: { $ref: '#/components/schemas/BillingCycle' }
        features: { type: array, items: { type: string } }

    CreatePlanRequest:
      type: object
      required: [name, priceType, price]
      properties:
        name: { type: string }
        priceType: { $ref: '#/components/schemas/PlanPriceType' }
        price: { type: number, exclusiveMinimum: 0 }
        currency: { type: string, default: USD }
        features: { type: array, items: { type: string } }

    # ────────── SaaS Invoice ──────────
    SaaSInvoice:
      type: object
      properties:
        _id: { type: string }
        apartmentId: { type: string, description: 'Apartment ID or populated { _id, name }' }
        planId: { type: string, description: 'Plan ID or populated { _id, name }' }
        period: { type: string, example: '2026-07' }
        amount: { type: number }
        currency: { type: string }
        status: { $ref: '#/components/schemas/InvoiceStatus' }
        generatedAt: { type: string, format: date-time }
        dueDate: { type: string, format: date-time }

    MarkInvoicePaidRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [paid] }

    # ────────── Unit ──────────
    Unit:
      type: object
      properties:
        _id: { type: string }
        apartmentId: { type: string }
        unitNumber: { type: string }
        unitType: { type: string }
        residentUserId: { type: string, nullable: true, description: 'User ID or populated object' }
        ownerId: { type: string, nullable: true, description: 'User ID or populated object' }
        status: { $ref: '#/components/schemas/UnitStatus' }
        residentHistory: { type: array, items: { type: object } }

    CreateUnitRequest:
      type: object
      required: [unitNumber]
      properties:
        unitNumber: { type: string, example: A-101 }
        unitType: { type: string }
        residentUserId: { type: string, nullable: true }
        ownerId: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/UnitStatus' }

    UpdateUnitRequest:
      type: object
      properties:
        unitNumber: { type: string }
        unitType: { type: string }
        residentUserId: { type: string, nullable: true }
        ownerId: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/UnitStatus' }

    # ────────── User / Resident / Account ──────────
    User:
      type: object
      properties:
        _id: { type: string }
        apartmentId: { type: string, nullable: true }
        type: { $ref: '#/components/schemas/RoleType' }
        residentType: { type: string, nullable: true }
        committeeId: { type: string, nullable: true }
        unitId: { type: string, nullable: true }
        name: { type: string }
        identifier: { type: string }
        phone: { type: array, items: { type: string } }
        email: { type: string }
        identityNumber: { type: string }
        residence: { type: string }
        customRole: { type: string }
        status: { $ref: '#/components/schemas/UserStatus' }
        createdAt: { type: string, format: date-time }

    Resident:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        identifier: { type: string }
        type: { type: string }
        residentType: { type: string, nullable: true }
        unitId: { type: string, nullable: true, description: 'Unit ID or populated { _id, unitNumber }' }
        unitNumber: { type: string, nullable: true }
        phone: { type: array, items: { type: string } }
        identityNumber: { type: string }
        residence: { type: string }
        status: { $ref: '#/components/schemas/UserStatus' }
        createdAt: { type: string, format: date-time }

    CreateUserRequest:
      type: object
      required: [name, identifier, password]
      properties:
        type: { $ref: '#/components/schemas/RoleType' }
        name: { type: string }
        identifier: { type: string }
        password: { type: string, minLength: 6 }
        phone: { type: array, items: { type: string } }
        email: { type: string }
        identityNumber: { type: string }
        residence: { type: string }
        unitId: { type: string, nullable: true }

    UpdateUserRequest:
      type: object
      properties:
        name: { type: string }
        status: { $ref: '#/components/schemas/UserStatus' }
        unitId: { type: string, nullable: true }
        residentType: { type: string, nullable: true }
        phone: { type: array, items: { type: string } }
        email: { type: string }
        identityNumber: { type: string }
        residence: { type: string }
        customRole: { type: string }

    UpdateAccountRequest:
      type: object
      properties:
        type: { $ref: '#/components/schemas/RoleType' }
        apartmentId: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/UserStatus' }

    # ────────── Committee ──────────
    Committee:
      type: object
      properties:
        _id: { type: string }
        apartmentId: { type: string }
        name: { type: string }
        description: { type: string }
        headUserId: { type: string, nullable: true, description: 'User ID or populated { _id, name, identifier }' }
        status: { type: string, enum: [active, inactive] }
        createdAt: { type: string, format: date-time }

    CreateCommitteeRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, example: Maintenance Committee }
        description: { type: string }

    UpdateCommitteeRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        status: { type: string, enum: [active, inactive] }

    CreateCommitteeHeadRequest:
      type: object
      required: [name, identifier, password]
      properties:
        name: { type: string }
        identifier: { type: string }
        password: { type: string, minLength: 6 }
        phone: { type: array, items: { type: string } }
        identityNumber: { type: string }
        residence: { type: string }

    CommitteeMember:
      type: object
      properties:
        _id: { type: string }
        apartmentId: { type: string }
        committeeId: { type: string }
        type: { $ref: '#/components/schemas/CommitteeRole' }
        name: { type: string }
        identifier: { type: string }
        customRole: { type: string }
        status: { $ref: '#/components/schemas/UserStatus' }

    AddMemberRequest:
      type: object
      properties:
        userId: { type: string, description: 'Existing user ID to add as member' }
        name: { type: string, description: 'For new member creation' }
        identifier: { type: string, description: 'For new member creation' }
        password: { type: string, minLength: 6, description: 'For new member creation' }
        phone: { type: array, items: { type: string } }
        identityNumber: { type: string }
        residence: { type: string }
        customRole: { type: string }

    UpdateMemberRoleRequest:
      type: object
      properties:
        role: { $ref: '#/components/schemas/CommitteeRole' }
        customRole: { type: string }

    # ────────── Custom Role ──────────
    CustomRole:
      type: object
      properties:
        _id: { type: string }
        committeeId: { type: string }
        name: { type: string }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }

    CreateCustomRoleRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }

    # ────────── Committee Ledger ──────────
    LedgerEntry:
      type: object
      properties:
        _id: { type: string }
        apartmentId: { type: string }
        committeeId: { type: string }
        type: { $ref: '#/components/schemas/LedgerType' }
        amount: { type: number }
        description: { type: string }
        date: { type: string, format: date-time }
        recordedBy: { type: string, description: 'User ID or populated { _id, name }' }

    CreateLedgerEntryRequest:
      type: object
      required: [type, amount, description]
      properties:
        type: { $ref: '#/components/schemas/LedgerType' }
        amount: { type: number, exclusiveMinimum: 0 }
        description: { type: string }
        date: { type: string, format: date-time, description: Defaults to now }

    # ────────── Maintenance Bill ──────────
    MaintenanceBill:
      type: object
      properties:
        _id: { type: string }
        apartmentId: { type: string }
        committeeId: { type: string, description: 'Committee ID or populated { _id, name }' }
        unitId: { type: string, description: 'Unit ID or populated { _id, unitNumber }' }
        amount: { type: number }
        currency: { type: string }
        period: { type: string, example: 2026-07 }
        status: { $ref: '#/components/schemas/BillStatus' }
        dueDate: { type: string, format: date-time }

    GenerateBillsRequest:
      type: object
      required: [amount, period, dueDate]
      properties:
        amount: { type: number, exclusiveMinimum: 0 }
        period: { type: string, example: 2026-07 }
        dueDate: { type: string, format: date-time }
        currency: { type: string, default: USD }

    # ────────── Complaint ──────────
    Complaint:
      type: object
      properties:
        _id: { type: string }
        apartmentId: { type: string }
        committeeId: { type: string, description: 'Committee ID or populated { _id, name }' }
        raisedByUnitId: { type: string, description: 'Unit ID or populated { _id, unitNumber }' }
        title: { type: string }
        description: { type: string }
        status: { $ref: '#/components/schemas/ComplaintStatus' }
        assignedTo: { type: string, nullable: true, description: 'User ID or populated { _id, name }' }
        createdAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time, nullable: true }
        rating: { type: integer, minimum: 1, maximum: 5, nullable: true }

    CreateComplaintRequest:
      type: object
      required: [committeeId, description]
      properties:
        committeeId: { type: string }
        title: { type: string }
        description: { type: string }

    UpdateComplaintRequest:
      type: object
      properties:
        status: { $ref: '#/components/schemas/ComplaintStatus' }
        assignedTo: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }

    # ────────── Visitor Log ──────────
    VisitorLog:
      type: object
      properties:
        _id: { type: string }
        apartmentId: { type: string }
        visitorName: { type: string }
        purpose: { type: string }
        unitVisited: { type: string }
        phone: { type: string }
        loggedBy: { type: string, description: 'User ID or populated { _id, name }' }
        checkIn: { type: string, format: date-time }
        checkOut: { type: string, format: date-time, nullable: true }
        preApproved: { type: boolean }
        qrCode: { type: string }
        preApprovedBy: { type: string, nullable: true }

    CreateVisitorLogRequest:
      type: object
      required: [visitorName, purpose, unitVisited]
      properties:
        visitorName: { type: string }
        purpose: { type: string }
        unitVisited: { type: string, example: A-101 }
        phone: { type: string }

    # ────────── Notice ──────────
    Notice:
      type: object
      properties:
        _id: { type: string }
        apartmentId: { type: string }
        committeeId: { type: string, nullable: true, description: 'Null = apartment-wide' }
        title: { type: string }
        body: { type: string }
        postedBy: { type: string, description: 'User ID or populated { _id, name }' }
        createdAt: { type: string, format: date-time }

    CreateNoticeRequest:
      type: object
      required: [title, body]
      properties:
        committeeId: { type: string, nullable: true, description: 'Omit for apartment-wide' }
        title: { type: string }
        body: { type: string }

    # ────────── Facility ──────────
    Facility:
      type: object
      properties:
        _id: { type: string }
        apartmentId: { type: string }
        name: { type: string }
        description: { type: string }
        capacity: { type: integer }
        available: { type: boolean }
        createdAt: { type: string, format: date-time }

    CreateFacilityRequest:
      type: object
      required: [name, capacity]
      properties:
        name: { type: string }
        description: { type: string }
        capacity: { type: integer, exclusiveMinimum: 0 }

    UpdateFacilityRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        capacity: { type: integer }
        available: { type: boolean }

    # ────────── Facility Booking ──────────
    FacilityBooking:
      type: object
      properties:
        _id: { type: string }
        apartmentId: { type: string }
        facilityId: { type: string, description: 'Facility ID or populated { _id, name }' }
        unitId: { type: string, description: 'Unit ID or populated { _id, unitNumber }' }
        date: { type: string, format: date }
        startTime: { type: string, example: '10:00' }
        endTime: { type: string, example: '12:00' }
        purpose: { type: string }
        status: { $ref: '#/components/schemas/BookingStatus' }
        createdAt: { type: string, format: date-time }

    CreateBookingRequest:
      type: object
      required: [date, startTime, endTime]
      properties:
        date: { type: string, format: date }
        startTime: { type: string, example: '10:00' }
        endTime: { type: string, example: '12:00' }
        purpose: { type: string }

    # ────────── Service Request ──────────
    ServiceRequest:
      type: object
      properties:
        _id: { type: string }
        apartmentId: { type: string }
        unitId: { type: string, description: 'Unit ID or populated { _id, unitNumber }' }
        residentUserId: { type: string, description: 'User ID or populated { _id, name }' }
        title: { type: string }
        description: { type: string }
        category: { type: string }
        priority: { $ref: '#/components/schemas/ServicePriority' }
        status: { $ref: '#/components/schemas/ServiceRequestStatus' }
        assignedTo: { type: string, nullable: true }
        notes: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateServiceRequestRequest:
      type: object
      required: [title]
      properties:
        title: { type: string }
        description: { type: string }
        category: { type: string, default: other }
        priority: { $ref: '#/components/schemas/ServicePriority' }

    UpdateServiceRequestRequest:
      type: object
      properties:
        status: { $ref: '#/components/schemas/ServiceRequestStatus' }
        assignedTo: { type: string }
        notes: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }

    # ────────── Document ──────────
    Document:
      type: object
      properties:
        _id: { type: string }
        apartmentId: { type: string }
        uploadedBy: { type: string, description: 'User ID or populated { _id, name }' }
        originalName: { type: string }
        mimeType: { type: string }
        size: { type: integer }
        category: { type: string }
        description: { type: string }
        createdAt: { type: string, format: date-time }

    # ────────── Upload ──────────
    Upload:
      type: object
      properties:
        _id: { type: string }
        apartmentId: { type: string }
        uploadedBy: { type: string }
        originalName: { type: string }
        mimeType: { type: string }
        size: { type: integer }
        createdAt: { type: string, format: date-time }

    # ────────── Notification ──────────
    Notification:
      type: object
      properties:
        _id: { type: string }
        apartmentId: { type: string }
        userId: { type: string }
        type: { type: string }
        message: { type: string }
        link: { type: string }
        read: { type: boolean }
        createdAt: { type: string, format: date-time }

    # ────────── Audit Log ──────────
    AuditLog:
      type: object
      properties:
        _id: { type: string }
        userId: { type: string, description: 'User ID or populated { _id, name }' }
        action: { type: string }
        resource: { type: string }
        resourceId: { type: string, nullable: true }
        details: { type: object }
        createdAt: { type: string, format: date-time }

    # ────────── Dashboard ──────────
    SiteAdminDashboard:
      type: object
      properties:
        totalApartments: { type: integer }
        activeApartments: { type: integer }
        totalPlans: { type: integer }
        totalUnits: { type: integer }
        totalResidents: { type: integer }
        monthlyRevenue: { type: number }
        recentApartments: { type: array, items: { $ref: '#/components/schemas/Apartment' } }
        recentInvoices: { type: array, items: { $ref: '#/components/schemas/SaaSInvoice' } }

    ApartmentAdminDashboard:
      type: object
      properties:
        totalUnits: { type: integer }
        occupiedUnits: { type: integer }
        vacantUnits: { type: integer }
        totalResidents: { type: integer }
        totalCommittees: { type: integer }
        recentComplaints: { type: integer }
        billingSummary: { type: object }

    CommitteeDashboard:
      type: object
      properties:
        totalMembers: { type: integer }
        balance: { type: number }
        totalIncome: { type: number }
        totalExpenses: { type: number }
        pendingComplaints: { type: integer }
        recentBills: { type: array, items: { $ref: '#/components/schemas/MaintenanceBill' } }
        recentLedger: { type: array, items: { $ref: '#/components/schemas/LedgerEntry' } }

    ResidentDashboard:
      type: object
      properties:
        unit: { $ref: '#/components/schemas/Unit' }
        unpaidBills: { type: array, items: { $ref: '#/components/schemas/MaintenanceBill' } }
        recentComplaints: { type: array, items: { $ref: '#/components/schemas/Complaint' } }
        notices: { type: array, items: { $ref: '#/components/schemas/Notice' } }

    # ────────── Payment ──────────
    CreatePaymentIntentRequest:
      type: object
      required: [billId]
      properties:
        billId: { type: string }

    PaymentIntent:
      type: object
      properties:
        id: { type: string }
        amount: { type: number }
        currency: { type: string }
        status: { type: string }
        simulated: { type: boolean }
        clientSecret: { type: string }

    # ────────── Analytics ──────────
    AnalyticsData:
      type: object
      properties:
        revenue: { type: array, items: { type: object } }
        occupancy: { type: object }
        complaints: { type: object }
        payments: { type: object }

    # ────────── Health ──────────
    HealthResponse:
      type: object
      properties:
        status: { type: string, example: ok }
        timestamp: { type: string, format: date-time }
        uptime: { type: number }
        memory: { type: object }
        db: { type: string }
        node: { type: string }
        env: { type: string }

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema: { type: string }
    CommitteeIdParam:
      name: committeeId
      in: path
      required: true
      schema: { type: string }
    MemberIdParam:
      name: memberId
      in: path
      required: true
      schema: { type: string }
    RoleIdParam:
      name: roleId
      in: path
      required: true
      schema: { type: string }
    BillIdParam:
      name: billId
      in: path
      required: true
      schema: { type: string }
    PageParam:
      name: page
      in: query
      schema: { type: integer, default: 1 }
    LimitParam:
      name: limit
      in: query
      schema: { type: integer, default: 20 }
    SearchParam:
      name: search
      in: query
      schema: { type: string }

paths:
  # ════════════════════════════════════════════════════════════════
  # AUTH
  # ════════════════════════════════════════════════════════════════
  /auth/apartments:
    get:
      tags: [Auth]
      summary: List active apartments for login dropdown
      responses:
        '200':
          description: List of active apartments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApartmentInfo'

  /auth/login:
    post:
      tags: [Auth]
      summary: Unified login for all role types
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT token + user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
        '403':
          description: Account inactive or apartment suspended

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change own password (authenticated)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200': { description: Password changed }
        '401': { description: Current password incorrect }

  # ════════════════════════════════════════════════════════════════
  # SITE ADMIN — Apartments
  # ════════════════════════════════════════════════════════════════
  /admin/apartments:
    get:
      tags: [Site Admin]
      summary: List all apartments with plan details
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
      responses:
        '200':
          description: Paginated list of apartments
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Apartment'
                  pagination: { $ref: '#/components/schemas/Pagination' }
    post:
      tags: [Site Admin]
      summary: Create a new apartment
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApartmentRequest'
      responses:
        '201': { description: Apartment created }
        '409': { description: Apartment name already exists }

  /admin/apartments/{id}:
    get:
      tags: [Site Admin]
      summary: Get a single apartment with plan details
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Apartment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Apartment'
        '404': { description: Apartment not found }
    put:
      tags: [Site Admin]
      summary: Update apartment
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApartmentRequest'
      responses:
        '200': { description: Apartment updated }
        '404': { description: Apartment not found }
    delete:
      tags: [Site Admin]
      summary: Delete an apartment
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200': { description: Apartment deleted }

  # ════════════════════════════════════════════════════════════════
  # SITE ADMIN — Plans
  # ════════════════════════════════════════════════════════════════
  /admin/plans:
    get:
      tags: [Site Admin]
      summary: List all pricing plans
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Plan'
                  pagination: { $ref: '#/components/schemas/Pagination' }
    post:
      tags: [Site Admin]
      summary: Create a pricing plan
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlanRequest'
      responses:
        '201': { description: Plan created }

  /admin/plans/{id}:
    put:
      tags: [Site Admin]
      summary: Update a plan
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlanRequest'
      responses:
        '200': { description: Plan updated }
        '404': { description: Plan not found }
    delete:
      tags: [Site Admin]
      summary: Delete a plan
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200': { description: Plan deleted }

  # ════════════════════════════════════════════════════════════════
  # SITE ADMIN — Apartment Admins & Accounts
  # ════════════════════════════════════════════════════════════════
  /admin/apartment-admins:
    post:
      tags: [Site Admin]
      summary: Create an Apartment Admin for a given apartment
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201': { description: Apartment admin created }
        '400': { description: Type must be apartment_admin }
        '404': { description: Apartment not found }
        '409': { description: Identifier already exists }

  /admin/accounts:
    get:
      tags: [Site Admin]
      summary: List all accounts (non-site-admin users)
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  pagination: { $ref: '#/components/schemas/Pagination' }
    post:
      tags: [Site Admin]
      summary: Create an account (apartment_admin or resident)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201': { description: Account created }
        '400': { description: apartmentId required or invalid type }
        '409': { description: Identifier already exists }

  /admin/accounts/{id}:
    put:
      tags: [Site Admin]
      summary: Update an account (type, status, apartment)
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
      responses:
        '200': { description: Account updated }
        '404': { description: Account not found }
    delete:
      tags: [Site Admin]
      summary: Delete an account
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200': { description: Account deleted }
        '404': { description: Account not found }

  /admin/accounts/{id}/change-password:
    put:
      tags: [Site Admin]
      summary: Admin change another user's password
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword]
              properties:
                newPassword: { type: string, minLength: 6 }
      responses:
        '200': { description: Password changed }
        '404': { description: User not found }

  # ════════════════════════════════════════════════════════════════
  # SITE ADMIN — SaaS Invoices
  # ════════════════════════════════════════════════════════════════
  /admin/invoices:
    get:
      tags: [Site Admin]
      summary: List all SaaS invoices across all apartments
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: search
          in: query
          schema: { type: string }
          description: Search by apartment name
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SaaSInvoice'
                  pagination: { $ref: '#/components/schemas/Pagination' }

  /admin/invoices/generate:
    post:
      tags: [Site Admin]
      summary: Manually trigger monthly invoice generation
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Generation results with per-apartment status

  /admin/invoices/export:
    get:
      tags: [Site Admin]
      summary: Export all invoices as CSV
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: CSV file download
          content:
            text/csv: {}

  /admin/invoices/{id}/mark-paid:
    put:
      tags: [Site Admin]
      summary: Mark an invoice as paid
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkInvoicePaidRequest'
      responses:
        '200': { description: Invoice updated }
        '404': { description: Invoice not found }

  # ════════════════════════════════════════════════════════════════
  # APARTMENT ADMIN — Units
  # ════════════════════════════════════════════════════════════════
  /apartment/units:
    get:
      tags: [Apartment Admin]
      summary: List units in the apartment
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Unit'
                  pagination: { $ref: '#/components/schemas/Pagination' }
    post:
      tags: [Apartment Admin]
      summary: Create a unit
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUnitRequest'
      responses:
        '201': { description: Unit created }
        '409': { description: Unit number already exists }

  /apartment/units/{id}:
    get:
      tags: [Apartment Admin]
      summary: Get a single unit
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unit'
        '404': { description: Unit not found }
    put:
      tags: [Apartment Admin]
      summary: Update a unit
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUnitRequest'
      responses:
        '200': { description: Unit updated }
        '404': { description: Unit not found }
    delete:
      tags: [Apartment Admin]
      summary: Delete a unit
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200': { description: Unit deleted }

  # ════════════════════════════════════════════════════════════════
  # APARTMENT ADMIN — Residents
  # ════════════════════════════════════════════════════════════════
  /apartment/residents:
    get:
      tags: [Apartment Admin]
      summary: List residents in the apartment
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Resident'
                  pagination: { $ref: '#/components/schemas/Pagination' }
    post:
      tags: [Apartment Admin]
      summary: Create a resident account
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201': { description: Resident created }
        '409': { description: Identifier already exists }

  /apartment/residents/{id}:
    put:
      tags: [Apartment Admin]
      summary: Update a resident
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200': { description: Resident updated }
        '404': { description: Resident not found }
    delete:
      tags: [Apartment Admin]
      summary: Delete a resident (frees unit)
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200': { description: Resident deleted }

  /apartment/unit-owners:
    get:
      tags: [Apartment Admin]
      summary: List unit owners
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/SearchParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  # ════════════════════════════════════════════════════════════════
  # APARTMENT ADMIN — Committees
  # ════════════════════════════════════════════════════════════════
  /apartment/committees:
    get:
      tags: [Apartment Admin]
      summary: List committees in the apartment
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Committee'
                  pagination: { $ref: '#/components/schemas/Pagination' }
    post:
      tags: [Apartment Admin]
      summary: Create a committee
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommitteeRequest'
      responses:
        '201': { description: Committee created }
        '409': { description: Committee name already exists }

  /apartment/committees/{id}:
    put:
      tags: [Apartment Admin]
      summary: Update committee
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommitteeRequest'
      responses:
        '200': { description: Committee updated }
        '404': { description: Committee not found }
    delete:
      tags: [Apartment Admin]
      summary: Delete a committee
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200': { description: Committee deleted }

  /apartment/committees/{id}/head:
    post:
      tags: [Apartment Admin]
      summary: Create a Committee Head for a committee
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommitteeHeadRequest'
      responses:
        '201': { description: Committee head created }
        '409': { description: Identifier already exists }

  # ════════════════════════════════════════════════════════════════
  # APARTMENT ADMIN — Invoices, Settings & Payment History
  # ════════════════════════════════════════════════════════════════
  /apartment/invoices:
    get:
      tags: [Apartment Admin]
      summary: List SaaS invoices for own apartment
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SaaSInvoice'
                  pagination: { $ref: '#/components/schemas/Pagination' }

  /apartment/payment-history:
    get:
      tags: [Apartment Admin]
      summary: Paid bills history
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: unitId
          in: query
          schema: { type: string }
        - name: residentId
          in: query
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MaintenanceBill'
                  pagination: { $ref: '#/components/schemas/Pagination' }

  /apartment/settings:
    get:
      tags: [Apartment Admin]
      summary: Get apartment settings
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Apartment'
    put:
      tags: [Apartment Admin]
      summary: Update apartment settings
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApartmentRequest'
      responses:
        '200': { description: Settings updated }

  # ════════════════════════════════════════════════════════════════
  # COMMITTEE — General & Members
  # ════════════════════════════════════════════════════════════════
  /committees:
    get:
      tags: [Committee]
      summary: List committees (admin sees all, committee sees own)
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Committee'
                  pagination: { $ref: '#/components/schemas/Pagination' }

  /committees/{id}:
    get:
      tags: [Committee]
      summary: Get a single committee
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Committee'
        '404': { description: Committee not found }

  /committees/{id}/members:
    get:
      tags: [Committee]
      summary: List committee members
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommitteeMember'
                  pagination: { $ref: '#/components/schemas/Pagination' }
    post:
      tags: [Committee]
      summary: Add a committee member (existing user or create new)
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
      responses:
        '201': { description: Member added }
        '409': { description: User already in a committee }

  /committees/{committeeId}/members/{memberId}:
    put:
      tags: [Committee]
      summary: Update member role (committee_member/committee_head)
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/CommitteeIdParam'
        - $ref: '#/components/parameters/MemberIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemberRoleRequest'
      responses:
        '200': { description: Role updated }
    delete:
      tags: [Committee]
      summary: Remove a committee member
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/CommitteeIdParam'
        - $ref: '#/components/parameters/MemberIdParam'
      responses:
        '200': { description: Member removed }

  /committees/{committeeId}/members/{memberId}/role:
    put:
      tags: [Committee]
      summary: Update member custom role label
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/CommitteeIdParam'
        - $ref: '#/components/parameters/MemberIdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                customRole: { type: string }
      responses:
        '200': { description: Custom role updated }
        '404': { description: Member not found }

  /committees/{id}/available-users:
    get:
      tags: [Committee]
      summary: List users available to be added as members
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  # ────────── Committee Roles ──────────
  /committees/{id}/roles:
    get:
      tags: [Committee]
      summary: List custom roles for a committee
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomRole'
    post:
      tags: [Committee]
      summary: Create a custom role
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomRoleRequest'
      responses:
        '201': { description: Role created }
        '409': { description: Role name already exists }

  /committees/{id}/roles/{roleId}:
    delete:
      tags: [Committee]
      summary: Delete a custom role
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/RoleIdParam'
      responses:
        '200': { description: Role deleted }

  # ────────── Committee Ledger ──────────
  /committees/{id}/ledger:
    get:
      tags: [Committee]
      summary: List ledger entries
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LedgerEntry'
                  pagination: { $ref: '#/components/schemas/Pagination' }
    post:
      tags: [Committee]
      summary: Add a ledger entry
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
